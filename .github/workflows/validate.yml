name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync skills manifest
        run: node ./scripts/sync-skills-manifest.mjs

      - name: Validate project
        run: node ./scripts/validate-jinyiwei.mjs

      - name: Install dry run
        run: node ./scripts/install-openclaw.mjs --dry-run --workspace /tmp
