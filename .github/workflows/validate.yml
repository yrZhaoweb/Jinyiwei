name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Sync skills manifest
        run: node ./scripts/sync-skills-manifest.mjs

      - name: Sync version
        run: node ./scripts/sync-version.mjs

      - name: Validate project
        run: node ./scripts/validate-jinyiwei.mjs

      - name: Unit tests
        run: npm test

      - name: CLI help
        run: node ./bin/jinyiwei.mjs help

      - name: CLI version
        run: node ./bin/jinyiwei.mjs --version

      - name: CLI status
        run: node ./bin/jinyiwei.mjs status

      - name: CLI validate
        run: node ./bin/jinyiwei.mjs validate

      - name: CLI install dry-run
        run: node ./bin/jinyiwei.mjs install /tmp --dry-run

      - name: npm pack dry-run
        run: npm pack --dry-run
